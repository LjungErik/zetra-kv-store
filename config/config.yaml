# Cluster peers — shared across all nodes.
# Per-node settings (id, addresses, data_dir) are set via environment variables.
cluster:
  peers:
    - id: "node1"
      address: "node1:7001"
      rest_address: "node1:8081"
    - id: "node2"
      address: "node2:7002"
      rest_address: "node2:8082"
    - id: "node3"
      address: "node3:7003"
      rest_address: "node3:8083"
